name: Refresh profile assets

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/profile-assets.yml"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-assets
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare output directories
        run: mkdir -p profile assets

      - name: Generate save-data card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&hide_border=true&disable_animations=true&rank_icon=github&bg_color=F7FBF9&title_color=F29AB7&text_color=29343D&icon_color=72C7B7&ring_color=F7D774&custom_title=LUOMO%20SAVE%20DATA"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate skill-inventory card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=8&hide_border=true&disable_animations=true&bg_color=F7FBF9&title_color=72C7B7&text_color=29343D&custom_title=SKILL%20INVENTORY"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate contribution routes
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/contribution-snake.svg?palette=github-light&color_snake=#f29ab7&color_dots=#dce9e4,#b7e1d8,#72c7b7,#f7d774,#f29ab7
            assets/contribution-snake-dark.svg?palette=github-dark&color_snake=#f7d774&color_dots=#29343d,#44515a,#72c7b7,#f29ab7,#f7d774

      - name: Commit refreshed assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg assets/contribution-snake*.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh profile assets [skip ci]"
          git push
